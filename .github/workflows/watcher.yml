name: Arxiv watcher

on:
  schedule:
    # 毎日 JST 09:00（= UTC 00:00）
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ★ リポジトリをチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v4

      # ★ Python のセットアップ
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ★ 依存パッケージをインストール
      - name: Install packages
        run: pip install -r requirements.txt

      # ★ スクリプト実行（Secrets を環境変数として渡す）
      - name: Run script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}   # ← 日本語要約に使用
          TOKEN_1: ${{ secrets.TOKEN_1 }}                 # ← GitHub Issues 作成用 PAT
          REPO: ${{ secrets.REPO }}                       # ← "username/reponame"
        run: python watch.py
